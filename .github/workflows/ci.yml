name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  swift-build-test:
    name: Swift build and test
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift and Xcode versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  dependency-guards:
    name: Dependency guards
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check dependency boundaries
        run: scripts/check-dependency-boundaries.sh
